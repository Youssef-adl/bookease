<svg xmlns="http://www.w3.org/2000/svg" width="800" height="533" viewBox="0 0 800 533">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9800"/>
      <stop offset="40%" stop-color="#F57C00"/>
      <stop offset="100%" stop-color="#E85D04"/>
    </linearGradient>
    <linearGradient id="shine" x1="0.2" y1="0" x2="0.8" y2="0.6">
      <stop offset="0%" stop-color="#FFCC80" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="curlGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D84315"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#E85D04" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="533" fill="#0A0A0A"/>

  <!-- === ICON === -->
  <g transform="translate(155, 135)" filter="url(#glow)">
    <!-- Shadow layer (peek behind peel) -->
    <rect x="14" y="14" width="230" height="230" rx="50" fill="#111"/>

    <!-- Main orange square -->
    <rect width="230" height="230" rx="50" fill="url(#iconGrad)"/>

    <!-- Top shine -->
    <rect width="230" height="130" rx="50" fill="url(#shine)"/>

    <!-- Subtle inner stroke -->
    <rect x="1.5" y="1.5" width="227" height="227" rx="49" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

    <!-- SCISSORS B LOGO -->
    <g transform="translate(50, 38)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
      <!-- Top handle circle -->
      <circle cx="38" cy="44" r="24" stroke-width="13" fill="none"/>
      <circle cx="38" cy="44" r="8" fill="url(#iconGrad)" stroke="none"/>

      <!-- Bottom handle circle -->
      <circle cx="38" cy="110" r="24" stroke-width="13" fill="none"/>
      <circle cx="38" cy="110" r="8" fill="url(#iconGrad)" stroke="none"/>

      <!-- Crossing blades -->
      <line x1="56" y1="56" x2="120" y2="28" stroke-width="13"/>
      <line x1="56" y1="98" x2="120" y2="126" stroke-width="13"/>

      <!-- Blade tips (rounded caps handle this, but adding small circles for emphasis) -->
      <circle cx="124" cy="26" r="6" fill="white" stroke="none"/>
      <circle cx="124" cy="128" r="6" fill="white" stroke="none"/>
    </g>

    <!-- Page peel bottom-right -->
    <path d="M 185 230 C 185 215 195 205 210 198 C 220 193 228 185 230 175 L 230 230 Z" fill="#111"/>
    <path d="M 188 230 C 188 218 196 208 208 202 C 218 197 226 190 230 180 L 230 230 Z" fill="url(#curlGrad)"/>
    <path d="M 192 230 C 192 220 198 212 207 206 C 215 201 224 194 230 185 L 230 230 Z" fill="rgba(255,255,255,0.08)"/>
  </g>

  <!-- === TEXT === -->
  <!-- "BOOK" in dark navy -->
  <text x="430" y="278" font-family="'Playfair Display', Georgia, serif" font-weight="900" font-size="92" fill="#2C3E50" letter-spacing="-2">BOOK</text>
  <!-- "EASE" in orange -->
  <text x="637" y="278" font-family="'Playfair Display', Georgia, serif" font-weight="900" font-size="92" fill="#E85D04" letter-spacing="-2">EASE</text>

  <!-- Tagline -->
  <text x="430" y="322" font-family="'DM Sans', Arial, sans-serif" font-weight="700" font-size="21" fill="#AAAAAA" letter-spacing="4">RÉSERVEZ. GÉREZ. DÉVELOPPEZ.</text>
</svg>